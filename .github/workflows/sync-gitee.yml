name: Sync to Gitee

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync code to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: ${{ secrets.GITEE_OWNER }}
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
        run: |
          set -euo pipefail
          git fetch --prune --tags origin "+refs/heads/*:refs/heads/*"
          if git remote get-url gitee >/dev/null 2>&1; then
            git remote remove gitee
          fi
          git remote add gitee "https://oauth2:${GITEE_TOKEN}@gitee.com/${GITEE_OWNER}/${GITEE_REPO}.git"
          git push gitee --prune --all
          git push gitee --prune --tags
